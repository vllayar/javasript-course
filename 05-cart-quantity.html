<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <p>Cart Quantity</p>
  <button onclick="
    alert(`Cart quantity: ${cartQuantity}`);
  ">Show Quantity</button>
  <button onclick="
    cartQuantity++;
    alert(`Cart quantity: ${cartQuantity}`);
  ">Add to Cart</button>
  <button onclick="
    cartQuantity += 2;
    alert(`Cart quantity: ${cartQuantity}`);
  ">+2</button>
  <button onclick="
    cartQuantity += 3;
    alert(`Cart quantity: ${cartQuantity}`);
  ">+3</button>
  <button onclick="
    cartQuantity = 0;
    alert(`Cart was reset.
          Cart quantity: ${cartQuantity}`);
  ">Reset Cart</button>

  <script>
    let cartQuantity = 0;
  </script>
</body>

</html>
