<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <p>Cart Quantity</p>
  <button onclick="
    alert(`Cart quantity: ${cartQuantity}`);
  ">Show Quantity</button>
  <button onclick="
    if (cartQuantity + 1 > 10) {
      alert('The cart is full!')
    } else {
      cartQuantity++;
      alert(`Cart quantity: ${cartQuantity}`);
    }
  ">Add to Cart</button>
  <button onclick="
    if (cartQuantity + 2 > 10) {
      alert('The cart is full!')
    } else {
      cartQuantity += 2;
      alert(`Cart quantity: ${cartQuantity}`);
    }
  ">+2</button>
  <button onclick="
    if (cartQuantity + 3 > 10) {
      alert('The cart is full!')
    } else {
      cartQuantity += 3;
      alert(`Cart quantity: ${cartQuantity}`);
    }
  ">+3</button>
  <button onclick="
    if (cartQuantity + 4 > 10) {
      alert('The cart is full!')
    } else {
      cartQuantity += 4;
      alert(`Cart quantity: ${cartQuantity}`);
    }
  ">+4</button>
  <button onclick="
    if (cartQuantity + 5 > 10) {
      alert('The cart is full!')
    } else {
      cartQuantity += 5;
      alert(`Cart quantity: ${cartQuantity}`);
    }
  ">+5</button>
  <button onclick="
    cartQuantity--;
    alert(`Cart quantity: ${cartQuantity}`);
  ">
    Remove from cart
  </button>
  <button onclick="
    cartQuantity -= 2;
    alert(`Cart quantity: ${cartQuantity}`);
  ">
    -2
  </button>
  <button onclick="
    cartQuantity -= 3;
    alert(`Cart quantity: ${cartQuantity}`);
  ">
    -3
  </button>
  <button onclick="
    cartQuantity = 0;
    alert(`Cart was reset.
          Cart quantity: ${cartQuantity}`);
  ">Reset Cart</button>

  <script>
    let cartQuantity = 0;
  </script>
</body>

</html>
