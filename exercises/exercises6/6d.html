<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booleans & If-Statements</title>
</head>

<body>
  <script>
    let age = 6;

    if (age <= 6 || age >= 65) {
      alert('Discount');
    } else {
      alert('No discount');
    }
  </script>
</body>

</html>
