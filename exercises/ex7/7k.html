<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <p>Cart Quantity</p>
  <button onclick="
    alert(`Cart quantity: ${cartQuantity}`);
  ">Show Quantity</button>
  <button onclick="
    updateCartQuantity(1, '+');
  ">Add to Cart</button>
  <button onclick="
    updateCartQuantity(2, '+');
  ">+2</button>
  <button onclick="
    updateCartQuantity(3, '+');
  ">+3</button>
  <button onclick="
    updateCartQuantity(4, '+');
  ">+4</button>
  <button onclick="
    updateCartQuantity(5, '+');
  ">+5</button>
  <button onclick="
    updateCartQuantity(1, '-');
  ">
    Remove from cart
  </button>
  <button onclick="
    updateCartQuantity(2, '-');
  ">
    -2
  </button>
  <button onclick="
    updateCartQuantity(3, '-');
  ">
    -3
  </button>
  <button onclick="
    cartQuantity = 0;
    alert(`Cart was reset.
          Cart quantity: ${cartQuantity}`);
  ">Reset Cart</button>

  <script>
    let cartQuantity = 0;

    function updateCartQuantity(number, operator) {
      if (operator === '+') {
        if (cartQuantity + number > 10) {
          alert('The cart is full!')
          return;
        }
      } else if (operator === '-') {
        if (cartQuantity - number < 0) {
          alert('Not enough items in the cart!')
          return;
        }
      }
      
      if (operator === '+') {
        cartQuantity += number;
        alert(`Cart quantity: ${cartQuantity}`);
      } else {
        cartQuantity -= number;
        alert(`Cart quantity: ${cartQuantity}`);
      }
    }
  </script>
</body>

</html>
