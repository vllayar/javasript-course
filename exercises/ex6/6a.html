<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booleans & If-Statements</title>
</head>

<body>


  <script>
    let hour = 22;

    if (hour >= 6 && hour <= 12) {
      alert('Good morning!');
    } else if (hour >= 13 && hour <= 17) {
      alert('Good afternoon!');
    } else {
      alert('Good night!');
    }
  </script>
</body>

</html>
