<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width initial-scale=1.0">
  <title>Booleans</title>
  <style>

  </style>
</head>

<body>
  <p>Rock Paper Scissors</p>

  <button onclick="
    userPick = 'rock';
    computerPick = Math.random();
    if (computerPick <= 1 / 3) {
      computerPick = 'rock'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            Tie.`);
    } else if (computerPick > 1 / 3 && computerPick <= 2 / 3) {
      computerPick = 'paper'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You lose.`);
    } else {
      computerPick = 'scissors'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You win!`);
    }
  ">Rock</button>
  <button onclick="
    userPick = 'paper'
    computerPick = Math.random();
    if (computerPick <= 1 / 3) {
      computerPick = 'rock'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You win!`);
    } else if (computerPick > 1 / 3 && computerPick <= 2 / 3) {
      computerPick = 'paper'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            Tie.`);
    } else {
      computerPick = 'scissors'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You lose.`);
    }
  ">Paper</button>
  <button onclick="
    userPick = 'scissors';
    computerPick = Math.random();
    if (computerPick <= 1 / 3) {
      computerPick = 'rock'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You lose.`);
    } else if (computerPick > 1 / 3 && computerPick <= 2 / 3) {
      computerPick = 'paper'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            You win!`);
    } else {
      computerPick = 'scissors'
      alert(`You picked ${userPick}.
            Computer picked ${computerPick}.
            Tie.`);
    }
  ">Scissors</button>

  <script>
    let userPick;
    let computerPick;
  </script>
</body>

</html>
